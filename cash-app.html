<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash App - Money</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 393px;
    background: #f0f0f0;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    position: relative;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 8px;
    background: #f0f0f0;
  }

  .status-time {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .status-icons svg {
    width: 18px;
    height: 18px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 24px 12px;
    background: #f0f0f0;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .header-actions {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .search-icon svg {
    width: 26px;
    height: 26px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    background: #e53935;
    border-radius: 50%;
  }

  .content {
    padding: 0 16px 16px;
  }

  .cash-card-banner {
    background: #c8f542;
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: -8px;
    position: relative;
    z-index: 0;
    height: 70px;
    overflow: hidden;
  }

  .shipped-badge {
    background: rgba(0,0,0,0.12);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-face {
    font-size: 28px;
    letter-spacing: 2px;
  }

  .balance-card {
    background: #fff;
    border-radius: 20px;
    padding: 28px 24px 20px;
    position: relative;
    z-index: 1;
  }

  .balance-label {
    text-align: center;
    font-size: 15px;
    color: #333;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .balance-amount {
    text-align: center;
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 8px;
  }

  .account-info {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
    font-size: 14px;
    color: #888;
  }

  .account-info span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .masked {
    display: inline-block;
    width: 32px;
    height: 16px;
    background: #e8e8e8;
    border-radius: 4px;
    vertical-align: middle;
  }

  .action-buttons {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .action-btn {
    flex: 1;
    padding: 14px;
    border-radius: 24px;
    border: none;
    background: #e8e8e8;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .paychecks-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 4px;
  }

  .paychecks-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
  }

  .check-icon {
    width: 24px;
    height: 24px;
    border: 2px solid #333;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-icon svg {
    width: 14px;
    height: 14px;
  }

  .paychecks-right {
    font-size: 13px;
    color: #888;
  }

  .section-card {
    background: #fff;
    border-radius: 20px;
    padding: 20px 24px;
    margin-top: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .section-title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .section-amount {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 2px;
  }

  .section-sub {
    font-size: 13px;
    color: #888;
  }

  .section-icons {
    display: flex;
    gap: 8px;
  }

  .money-icon {
    width: 44px;
    height: 44px;
    background: #f0f0f0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .more-section {
    padding: 20px 8px 8px;
  }

  .more-title {
    font-size: 15px;
    font-weight: 700;
    color: #333;
  }

  .tab-bar {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 0 8px;
    background: #f0f0f0;
    border-top: 1px solid #e0e0e0;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: #333;
    font-weight: 600;
  }

  .tab-icon {
    font-size: 20px;
    font-weight: 800;
  }

  .home-indicator {
    display: flex;
    justify-content: center;
    padding: 8px 0 12px;
    background: #f0f0f0;
  }

  .home-bar {
    width: 140px;
    height: 5px;
    background: #333;
    border-radius: 3px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="10" width="3" height="6" rx="1" fill="#000"/><rect x="5.5" y="7" width="3" height="9" rx="1" fill="#000"/><rect x="10" y="4" width="3" height="12" rx="1" fill="#000"/><rect x="14.5" y="1" width="3" height="15" rx="1" fill="#000"/></svg>
      <svg viewBox="0 0 18 18" fill="none"><path d="M9 3C5.5 3 2.5 5 1 8c1.5 3 4.5 5 8 5s6.5-2 8-5c-1.5-3-4.5-5-8-5z" stroke="#000" stroke-width="1.5" fill="none"/><path d="M3 2.5C5.5 4.5 7 6 9 8" stroke="#000" stroke-width="1.5"/><path d="M15 2.5C12.5 4.5 11 6 9 8" stroke="#000" stroke-width="1.5"/></svg>
      <svg viewBox="0 0 24 14" fill="none"><rect x="0.5" y="0.5" width="20" height="13" rx="2" stroke="#000" fill="none"/><rect x="2" y="2" width="17" height="10" rx="1" fill="#000"/><rect x="21.5" y="4" width="2" height="6" rx="1" fill="#000"/></svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>Money</h1>
    <div class="header-actions">
      <span class="search-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5"><circle cx="10.5" cy="10.5" r="7"/><line x1="15.5" y1="15.5" x2="22" y2="22"/></svg>
      </span>
      <div class="avatar"></div>
    </div>
  </div>

  <div class="content">
    <!-- Cash Card Banner -->
    <div class="cash-card-banner">
      <div class="shipped-badge">&#9992; Shipped</div>
      <span class="card-face">&#215;&#8239;&#215;<br>&#8212;</span>
    </div>

    <!-- Balance Card -->
    <div class="balance-card">
      <div class="balance-label">Cash balance</div>
      <div class="balance-amount">$1.00</div>
      <div class="account-info">
        <span>Account &#8226;&#8226; <span class="masked"></span></span>
        <span>Routing &#8226;&#8226; <span class="masked"></span></span>
      </div>
      <div class="action-buttons">
        <button class="action-btn">Add money</button>
        <button class="action-btn">Withdraw</button>
      </div>
      <div class="paychecks-row">
        <div class="paychecks-left">
          <div class="check-icon">
            <svg viewBox="0 0 14 14" fill="none" stroke="#333" stroke-width="2"><polyline points="2,7 6,11 12,3"/></svg>
          </div>
          Paychecks
        </div>
        <div class="paychecks-right">Ready for first paycheck</div>
      </div>
    </div>

    <!-- Savings -->
    <div class="section-card">
      <div>
        <div class="section-title">Savings</div>
        <div class="section-amount">$0.00</div>
        <div class="section-sub">Up to 3.75% interest</div>
      </div>
      <div class="section-icons">
        <div class="money-icon">💵</div>
        <div class="money-icon">💵</div>
      </div>
    </div>

    <!-- Pools -->
    <div class="section-card">
      <div>
        <div class="section-title">Pools</div>
        <div class="section-amount">$0.00</div>
        <div class="section-sub">1 closed</div>
      </div>
      <div class="section-icons">
        <div class="money-icon" style="font-size: 18px;">👥</div>
      </div>
    </div>

    <!-- More for you -->
    <div class="more-section">
      <div class="more-title">More for you</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab-item">
      <span class="tab-icon">$1</span>
    </div>
    <div class="tab-item">
      <span class="tab-icon">$</span>
    </div>
    <div class="tab-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
    </div>
  </div>

  <!-- Home Indicator -->
  <div class="home-indicator">
    <div class="home-bar"></div>
  </div>
</div>

</body>
</html>
